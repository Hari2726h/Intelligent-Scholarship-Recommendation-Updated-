# ====================================================================
# Scholarship Management System — Docker Compose
# ====================================================================
# Usage:
#   cp .env.example .env    # Configure environment variables
#   docker compose up -d    # Start all services
#   docker compose logs -f  # View logs
#   docker compose down     # Stop all services
# ====================================================================

services:
  # ====== MySQL Database ======
  mysql:
    image: mysql:8.0
    container_name: scholarship-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: scholarship_portal
      MYSQL_USER: ${DB_USERNAME:-scholaruser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-scholarpass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - scholarship-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=256M

  # ====== Redis Cache ======
  redis:
    image: redis:7-alpine
    container_name: scholarship-redis
    restart: unless-stopped
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - scholarship-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec

  # ====== Apache Zookeeper (required by Kafka) ======
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: scholarship-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - scholarship-network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ====== Apache Kafka ======
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: scholarship-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - scholarship-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ====== Backend Service ======
  backend:
    build:
      context: ./Scholarship_Portal_for_Students-main
      dockerfile: Dockerfile
    container_name: scholarship-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      # Spring profile
      SPRING_PROFILES_ACTIVE: prod
      # Database
      DB_URL: jdbc:mysql://mysql:3306/scholarship_portal?createDatabaseIfNotExist=true
      DB_USERNAME: ${DB_USERNAME:-scholaruser}
      DB_PASSWORD: ${DB_PASSWORD:-scholarpass}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your-secure-256-bit-secret-key-change-this-in-production}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      # Redis (inside Docker network)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Kafka (inside Docker network)
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # SMTP
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-noreply@scholarship.com}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:80}
      # Embedded infra disabled
      APP_LOCAL_INFRA_ENABLED: "false"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks:
      - scholarship-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ====== Frontend Service ======
  frontend:
    build:
      context: ./scholarship-portal-frontend
      dockerfile: Dockerfile
    container_name: scholarship-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - scholarship-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

# ====== Persistent Volumes ======
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_log:
    driver: local
  kafka_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local

# ====== Network ======
networks:
  scholarship-network:
    driver: bridge
