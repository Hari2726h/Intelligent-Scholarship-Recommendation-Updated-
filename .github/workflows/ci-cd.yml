name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Backend Tests
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: scholarship_portal_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: ./Scholarship_Portal_for_Students-main
        run: mvn clean test

      - name: Build package
        working-directory: ./Scholarship_Portal_for_Students-main
        run: mvn clean package -DskipTests

  # Frontend Tests
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./scholarship-portal-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./scholarship-portal-frontend
        run: npm ci

      - name: Run tests
        working-directory: ./scholarship-portal-frontend
        run: npm test -- --coverage --watchAll=false

      - name: Build application
        working-directory: ./scholarship-portal-frontend
        run: npm run build

  # Docker Build and Push
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./Scholarship_Portal_for_Students-main
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/scholarship-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/scholarship-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./scholarship-portal-frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/scholarship-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/scholarship-frontend:${{ github.sha }}

      - name: Build and push scraper image
        uses: docker/build-push-action@v4
        with:
          context: ./scholarship-scraper
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/scholarship-scraper:latest
            ${{ secrets.DOCKER_USERNAME }}/scholarship-scraper:${{ github.sha }}


  # Code Quality
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run SonarQube analysis (optional)
        working-directory: ./Scholarship_Portal_for_Students-main
        run: |
          # mvn sonar:sonar -Dsonar.projectKey=scholarship-portal
        continue-on-error: true
