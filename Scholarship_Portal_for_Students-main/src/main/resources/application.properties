# ====================================================================
# SCHOLARSHIP PORTAL — Development Configuration
# ====================================================================
# All secrets are externalized via environment variables with safe defaults.
# For production, set environment variables or use application-prod.properties.
# ====================================================================

# ====== Database Configuration ======
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/scholarship_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Hari@2006}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# NOTE: Removed deprecated MySQL8Dialect — Hibernate 6+ auto-detects the dialect.
# NOTE: Removed enable_lazy_load_no_trans=true — anti-pattern that hides N+1 query problems.
spring.jpa.open-in-view=false

# HikariCP Connection Pool (production-grade defaults)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ====== File Upload Configuration ======
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload.dir=${UPLOAD_DIR:uploads/documents}

# ====== Logging Configuration ======
logging.level.root=INFO
logging.level.com.scholarship.scholarshipportal=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/scholarship-app.log

# ====== JWT Configuration ======
jwt.secret=${JWT_SECRET:mySuperSecretKeyForScholarshipPortalJwt1234567890DefaultDevOnly}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ====== Email Configuration (SMTP) ======
app.email.enabled=${EMAIL_ENABLED:true}
spring.mail.from=${SMTP_FROM:hari2726h@gmail.com}
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:hari2726h@gmail.com}
spring.mail.password=${SMTP_PASSWORD:wabatoatxejpglfj}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ====== Redis Configuration ======
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000
# Lettuce connection pool
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=1000

# ====== Apache Kafka Configuration ======
# bootstrap-servers is set dynamically by LocalInfraBootstrap (Embedded Kafka) in dev mode.
# For Docker/production, override via KAFKA_BOOTSTRAP_SERVERS env var.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
# Consumer configuration
spring.kafka.consumer.group-id=scholarship-portal-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.scholarship.scholarshipportal.*
# Producer configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

# ====== CORS Configuration ======
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000}

# ====== Spring Boot Actuator (Production Monitoring) ======
management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches
management.endpoint.health.show-details=always

# Application info
management.info.env.enabled=true
info.app.name=Scholarship Portal
info.app.description=Production-Grade Scholarship Management System
info.app.version=2.0.0
info.app.java.version=${java.version}

# Health check configuration
management.health.redis.enabled=true
management.health.diskspace.enabled=true
management.health.db.enabled=true

# Prometheus metrics
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=scholarship-portal

# ====== Server Configuration ======
server.error.include-message=always
server.error.include-binding-errors=always