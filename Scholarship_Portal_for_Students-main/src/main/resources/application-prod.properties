# ====================================================================
# SCHOLARSHIP PORTAL — Production Configuration
# ====================================================================
# All values MUST be provided via environment variables.
# No defaults for secrets in production.
# ====================================================================

# Database (REQUIRED — no defaults)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hibernate — validate schema, never auto-modify in production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# HikariCP — production-tuned connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload.dir=${UPLOAD_DIR:/var/www/uploads}

# JWT (REQUIRED — no default)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Email (REQUIRED — no defaults for credentials)
app.email.enabled=${EMAIL_ENABLED:true}
spring.mail.from=${SMTP_FROM}
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Redis
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}

# Logging — Production Level
logging.level.root=WARN
logging.level.com.scholarship.scholarshipportal=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=${LOG_FILE:/var/log/scholarship-app.log}

# Security — hide error details from end users
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# CORS
cors.allowed.origins=${CORS_ORIGINS:https://yourdomain.com}

# Disable embedded infra in production
app.local-infra.enabled=false
